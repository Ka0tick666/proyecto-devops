version: '3.8'

services:
  back-despachos:
    build:
      context: ./back-Despachos_SpringBoot
    ports:
      - "8081:8080"
    networks:
      - innova-net
    volumes:
      - data-despachos:/app/data

  back-ventas:
    build:
      context: ./back-Ventas_SpringBoot
    ports:
      - "8082:8080"
    networks:
      - innova-net

  frontend:
    build:
      context: ./front_despacho
    ports:
      - "80:80"
    networks:
      - innova-net
    depends_on:
      - back-despachos
      - back-ventas

networks:
  innova-net:
    driver: bridge

volumes:
  data-despachos: